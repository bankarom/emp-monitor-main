<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmpMonitor Agent Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 350px;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      color: #667eea;
      font-size: 28px;
      font-weight: 700;
    }

    .logo p {
      color: #666;
      font-size: 14px;
      margin-top: 5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #333;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group input::placeholder {
      color: #aaa;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #e74c3c;
      text-align: center;
      font-size: 13px;
      margin-top: 15px;
      padding: 10px;
      background: #fee;
      border-radius: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 15px;
    }

    .loading.show {
      display: block;
    }

    .loading-spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 13px;
      margin-top: 10px;
    }

    .server-config {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .server-config label {
      display: block;
      color: #666;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .server-config input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      font-size: 12px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .toggle-config {
      text-align: center;
      margin-top: 15px;
    }

    .toggle-config button {
      background: none;
      border: none;
      color: #667eea;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }

    .toggle-config button:hover {
      color: #764ba2;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>EmpMonitor</h1>
      <p>Employee Monitoring Agent</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>

    <div class="error-message" id="errorMessage"></div>

    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p class="loading-text">Logging in...</p>
    </div>

    <div class="toggle-config">
      <button type="button" id="toggleConfig">Advanced Settings</button>
    </div>

    <div class="server-config" id="serverConfig" style="display: none;">
      <label>Desktop API URL</label>
      <input type="text" id="desktopApiUrl" placeholder="http://localhost:3002">
      
      <label>Store Logs API URL</label>
      <input type="text" id="storeLogsApiUrl" placeholder="http://localhost:3001">
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
